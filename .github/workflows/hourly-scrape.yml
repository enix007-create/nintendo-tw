name: Hourly scrape

on:
  schedule:
    - cron: '5 * * * *'   # 每小時的第 5 分鐘（避開整點熱點）
  workflow_dispatch:       # 允許手動觸發
  push:
    branches: [main]
    paths:
      - 'scraper/**'
      - '.github/workflows/**'

permissions:
  contents: write           # 允許 commit games.json

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python deps
        run: |
          pip install -r scraper/requirements.txt
          playwright install --with-deps chromium

      - name: Run scraper
        id: scrape
        run: |
          # 每日 03:05 UTC（=台灣 11:05）跑 bootstrap 全範圍掃描；其餘小時只 refresh
          HOUR=$(date -u +%H)
          if [ "$HOUR" = "03" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Running BOOTSTRAP (full scan)"
            python scraper/scrape.py --phase=bootstrap
          else
            echo "Running REFRESH"
            python scraper/scrape.py --phase=refresh
          fi

      - name: Commit updated data
        if: always()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

          # 策略：對產出檔（games.json / _cache）來說，CI 跑出來的就是最新的。
          # 為了避免和外部 commit 衝突，每次都用 fetch + reset --soft 把工作區重貼到 origin/main，
          # 再把本次產出 add+commit，確保 push 一定 fast-forward。
          for attempt in 1 2 3 4; do
            # 保存當前產出（暫存到 /tmp，避免 reset 動到）
            mkdir -p /tmp/scrape-out/web /tmp/scrape-out/scraper
            cp -f web/games.json /tmp/scrape-out/web/games.json 2>/dev/null || true
            cp -rf scraper/_cache /tmp/scrape-out/scraper/ 2>/dev/null || true

            git fetch origin main
            git reset --hard origin/main

            # 把產出貼回
            mkdir -p web scraper
            cp -f /tmp/scrape-out/web/games.json web/games.json 2>/dev/null || true
            cp -rf /tmp/scrape-out/scraper/_cache scraper/ 2>/dev/null || true

            git add web/games.json scraper/_cache/ 2>/dev/null || true
            if git diff --cached --quiet; then
              echo "沒有實質變動"
              exit 0
            fi
            git commit -m "data: refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            if git push; then
              echo "push 成功 (attempt $attempt)"
              exit 0
            fi
            echo "push 失敗，重新 sync 後再試 ($attempt/4)"
            sleep $((attempt * 3))
          done
          echo "push 4 次都失敗"; exit 1

      - name: Notify on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: '[nintendo-tw] 爬蟲失敗 ${{ github.run_id }}'
          to: enix_007@yahoo.com.tw
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            GitHub Actions 跑爬蟲失敗。
            時間：${{ github.event.repository.updated_at }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    if: always()
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/
      - id: deployment
        uses: actions/deploy-pages@v4
